<!DOCTYPE html>
<html>
    <head>
        <style>
             * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
    
            body {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 8px;
            }
    
            header, nav, footer {
                background-color: #e5e7e9;
                padding: 28px;
                text-align: center;
                width: 100%;
            }

            section {
                display: flex;
                gap: 8px;
                width: 100%;
            }
            
            aside, main{
                background-color: #e5e7e9;
                width: 20%;
                min-height: 600px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
    
            main {
                flex: 1;
            }
        </style>
    </head>
<body>
    <header>
        Header
    </header>
    <nav>
        Navigation Menu
    </nav>

    <section>
        <aside>
            Content
        </aside>
        <main>
            Main Content
        </main>
        <aside>
            Content
        </aside>
    </section>
    
    <footer>
        Footer
    </footer>
</body>
</html>
