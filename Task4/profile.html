<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="resources/css/style-profile.css">
</head>

<body>
    <header class="header">
        <a href="#" id="left">uzair_123 ▾</a>
        <div class="header-icons">
            <span>☰</span>
        </div>
    </header>
    <main>

        <section class="profile">
            <div class="avatar">
                <div class="avatar-icon"><img src="resources/images/pfp.png" alt="Avatar"></div>
                <div class="story-btn">+</div>
            </div>
            <div class="stats">
                <div>
                    <div class="label">posts</div>
                    <div class="number">42</div>
                </div>
                <div style="cursor: pointer;">
                    <div class="label">followers</div>
                    <div class="number">12.5k</div>
                </div>
                <div style="cursor: pointer;">

                    <div class="label">following</div>
                    <div class="number">380</div>
                </div>
            </div>
        </section>

        <section class="bio">
            <p class="name">Muhammad Uzair</p>
            <p class="category">Artist</p>
            <p>Posting daily<br> Check out my portfolio! </br> <a href="#">github.com</a></p>
        </section>

        <section class="actions">
            <button class="btn">Edit Profile</button>
            <button class="btn">Share Profile</button>
            <button class="btn-icon"><img class="btn-icon-img" src="resources/images/profile-icon.webp" alt="Profile"></button>
        </section>

        <section class="highlights">
            <div class="highlight">
                <div class="new-highlight-circle">＋</div>
                <span>New</span>
            </div>
            <div class="highlight">
                <div class="active-circle">
                    <img src="resources/images/highlight1.jpg" alt="Design">
                </div>
                <span>Designs</span>
            </div>
            <div class="highlight">
                <div class="active-circle">
                    <img src="resources/images/highlight2.jpg" alt="Design">
                </div>
                <span>Art</span>
            </div>
            <div class="highlight">
                <div class="active-circle">
                    <img src="resources/images/highlight3.jpg" alt="Design">
                </div>
                <span>Code</span>
            </div>
        </section>

        <section class="contents">
            <div class="tabs">
                <div class="tab active">Posts</div>
                <div class="tab">Reels</div>
            </div>

            <div class="posts">
                <div class="add-post">+</div>
                <div class="post"><img src="resources/images/post1.png" alt="Post"></div>
                <div class="post"><img src="resources/images/post2.png" alt="Post"></div>
                <div class="post"><img src="resources/images/post3.jpg" alt="Post"></div>
                <div class="post"><img src="resources/images/post4.jpg" alt="Post"></div>
                <div class="post"><img src="resources/images/post5.jpg" alt="Post"></div>
                <div class="post"><img src="resources/images/post6.jpg" alt="Post"></div>
                <div class="post"><img src="resources/images/post7.jpg" alt="Post"></div>
                <div class="post"><img src="resources/images/post8.png" alt="Post"></div>
            </div>
        </section>

        <nav class="nav-footer">
            <a class="nav-item" href="home.html"><img src="resources/images/home-unclicked.png" alt="Feed"></a>
            <a class="nav-item" href="fyp.html"><img src="resources/images/search.png" alt="Explore"></a>
            <a class="nav-item" href="#"><img src="resources/images/add.png" alt="Add"></a>
            <a class="nav-item" href="#"><img src="resources/images/notifications.png" alt="Notifications"></a>
            <a class="nav-item" href="profile.html">
                <div class="nav-avatar"><img src="resources/images/pfp.png" alt="Avatar"></div>
            </a>
        </nav>
    </main>
</body>

</html>
